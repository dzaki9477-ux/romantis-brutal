<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
body {
  margin:0;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial, sans-serif;
  background:black;
  color:white;
  text-align:center;
}

#countdown {
  font-size:60px;
  animation:pulse 1s infinite;
}

@keyframes pulse {
  0%{transform:scale(1);}
  50%{transform:scale(1.3);}
  100%{transform:scale(1);}
}

.question {
  font-size:28px;
  display:none;
}

button {
  padding:15px 25px;
  font-size:18px;
  border:none;
  border-radius:30px;
  margin:15px;
  cursor:pointer;
  transition:0.3s;
}

#yes {
  background:#ff1744;
  color:white;
  box-shadow:0 0 20px #ff1744;
}

#no {
  background:white;
  color:black;
  position:absolute;
}

.heart {
  position:absolute;
  font-size:20px;
  animation:fall linear infinite;
}

@keyframes fall {
  0%{transform:translateY(-10vh);}
  100%{transform:translateY(110vh);}
}

.shake {
  animation:shake 0.2s infinite;
}

@keyframes shake {
  0%{transform:translate(2px,2px);}
  50%{transform:translate(-2px,-2px);}
  100%{transform:translate(2px,-2px);}
}
</style>
</head>

<body>

<div id="countdown">3</div>

<div class="question" id="mainContent">
  <h1>Maukah kamu menjadi My Girlfriend? 💖</h1>
  <button id="yes">YA 💕</button>
  <button id="no">TIDAK 😈</button>
</div>

<audio id="bgm" autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>
let count = 3;
const countdownEl = document.getElementById("countdown");
const mainContent = document.getElementById("mainContent");

const timer = setInterval(()=>{
  count--;
  if(count === 0){
    clearInterval(timer);
    countdownEl.style.display="none";
    mainContent.style.display="block";
    document.body.style.background="linear-gradient(45deg,#ff6ec4,#7873f5)";
  } else {
    countdownEl.innerText = count;
  }
},1000);

// hujan love brutal
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=Math.random()*3+2+"s";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
}
setInterval(createHeart,150);

// tombol tidak kabur + mengecil + nambah
